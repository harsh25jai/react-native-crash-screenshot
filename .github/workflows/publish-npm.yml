# Publishes to npm when a version tag is pushed (e.g. v0.2.0 after package.json is 0.2.0).
#
# Versioning: bump package.json (e.g. `npm version minor` / `patch` / `major`) on main,
# commit, then tag and push the tag. Auto-bumping on every merge to main is not used
# here—manual (or a dedicated “version PR”) keeps semver and release notes under control.

name: Publish npm

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: publish-npm-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    if: ${{ !github.event.repository.fork && startsWith(github.ref, 'refs/tags/v') }}
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc
          registry-url: 'https://registry.npmjs.org'
          cache: yarn

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Typecheck
        run: yarn typecheck

      - name: Test
        run: yarn test --maxWorkers=2

      - name: Build package (bob)
        run: yarn prepare

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      - name: Draft GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists, skipping draft create."
          else
            gh release create "$TAG" --draft --verify-tag \
              --title "$TAG" \
              --generate-notes
          fi
