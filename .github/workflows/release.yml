# package.json on main → ensure v* tag → draft GitHub Release → npm publish.
# Each step is idempotent: existing tag / release / npm version → skip that piece only.

name: Release

on:
  push:
    branches:
      - main
    paths:
      - 'package.json'
  workflow_dispatch:

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  tag:
    runs-on: ubuntu-latest
    if: ${{ !github.event.repository.fork }}
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.ver.outputs.tag }}
      name: ${{ steps.ver.outputs.name }}
      version: ${{ steps.ver.outputs.version }}
      did_push: ${{ steps.sync.outputs.did_push }}
      publish: ${{ steps.gate.outputs.publish }}
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 0

      - name: Read package.json
        id: ver
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          NAME="$(node -p "require('./package.json').name")"
          if [[ -z "$VERSION" ]]; then
            echo "::error::Empty version in package.json"
            exit 1
          fi
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Using ${NAME} ${TAG} at ${GITHUB_SHA}"

      - name: Ensure tag at ${{ github.sha }}
        id: sync
        env:
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          git fetch origin --tags --force
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            EXISTING="$(git rev-parse "$TAG^{}")"
            if [[ "$EXISTING" != "$GITHUB_SHA" ]]; then
              echo "::error::Tag ${TAG} points at ${EXISTING}; this commit is ${GITHUB_SHA}. Bump package.json version and merge again, or delete remote tag ${TAG} only if it was never published and you accept rewriting history."
              exit 1
            fi
            echo "Remote tag ${TAG} already at this commit — skipping tag create/push."
            echo "did_push=false" >> "$GITHUB_OUTPUT"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "${TAG}" -m "Release ${TAG}" "${GITHUB_SHA}"
            git push origin "refs/tags/${TAG}"
            echo "Pushed new tag ${TAG}."
            echo "did_push=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Draft GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.ver.outputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            echo "GitHub release ${TAG} already exists — skipping create."
          else
            echo "Creating draft GitHub release ${TAG}."
            gh release create "$TAG" --draft --verify-tag --repo "$REPO" \
              --title "$TAG" \
              --generate-notes
          fi

      - name: Decide whether to run npm job
        id: gate
        env:
          DID_PUSH: ${{ steps.sync.outputs.did_push }}
        run: |
          NAME="$(node -p "require('./package.json').name")"
          VERSION="$(node -p "require('./package.json').version")"
          REGISTRY="https://registry.npmjs.org/"
          if npm view "${NAME}@${VERSION}" version --registry="$REGISTRY" >/dev/null 2>&1; then
            echo "${NAME}@${VERSION} already on npm — skipping npm job (no checkout/tests/publish)."
            echo "publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "$DID_PUSH" == "true" ]]; then
            echo "New tag and version not on npm yet — will run npm job."
            echo "publish=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Version not on npm (retry) — will run npm job."
          echo "publish=true" >> "$GITHUB_OUTPUT"

  npm:
    needs: tag
    runs-on: ubuntu-latest
    if: ${{ !github.event.repository.fork && needs.tag.outputs.publish == 'true' }}
    permissions:
      contents: write
    steps:
      - name: Ensure GitHub release exists
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.tag.outputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            echo "GitHub release ${TAG} exists — skipping create."
          else
            echo "Creating draft GitHub release ${TAG}."
            gh release create "$TAG" --draft --verify-tag --repo "$REPO" \
              --title "$TAG" \
              --generate-notes
          fi

      - name: Check npm registry
        id: reg
        env:
          NAME: ${{ needs.tag.outputs.name }}
          VERSION: ${{ needs.tag.outputs.version }}
        run: |
          REGISTRY="https://registry.npmjs.org/"
          if npm view "${NAME}@${VERSION}" version --registry="$REGISTRY" >/dev/null 2>&1; then
            echo "${NAME}@${VERSION} already on npm — skipping checkout, tests, and publish."
            echo "on_npm=true" >> "$GITHUB_OUTPUT"
          else
            echo "Version not on registry — will checkout, test, build, publish."
            echo "on_npm=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout tag
        if: ${{ steps.reg.outputs.on_npm != 'true' }}
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          ref: ${{ needs.tag.outputs.tag }}
          fetch-depth: 0

      - name: Setup Node.js
        if: ${{ steps.reg.outputs.on_npm != 'true' }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc
          registry-url: 'https://registry.npmjs.org'
          cache: yarn

      - name: Enable Corepack
        if: ${{ steps.reg.outputs.on_npm != 'true' }}
        run: corepack enable

      - name: Install dependencies
        if: ${{ steps.reg.outputs.on_npm != 'true' }}
        run: yarn install --immutable

      - name: Typecheck
        if: ${{ steps.reg.outputs.on_npm != 'true' }}
        run: yarn typecheck

      - name: Test
        if: ${{ steps.reg.outputs.on_npm != 'true' }}
        run: yarn test --maxWorkers=2

      - name: Build package (bob)
        if: ${{ steps.reg.outputs.on_npm != 'true' }}
        run: yarn prepare

      - name: Publish to npm
        if: ${{ steps.reg.outputs.on_npm != 'true' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          NAME="$(node -p "require('./package.json').name")"
          VERSION="$(node -p "require('./package.json').version")"
          REGISTRY="https://registry.npmjs.org/"
          if npm view "${NAME}@${VERSION}" version --registry="$REGISTRY" >/dev/null 2>&1; then
            echo "${NAME}@${VERSION} appeared on npm before publish — skipping npm publish."
            exit 0
          fi
          npm publish --access public
